name: CI Validation

on:
  push:
    branches-ignore:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      
      - name: Lint
        run: npm run lint
        
      - name: Check Translation Sync
        run: npm run validate:i18n
        
      - name: Unit Tests & Coverage
        run: npm run test:coverage
        
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: code-coverage-report
          path: coverage/  # Path configured in vitest.config.ts

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci

      - name: Audit Dependencies
        run: npm audit --audit-level=high || true
        continue-on-error: true

      - name: Secrets & Dangerous Patterns
        run: |
          echo "🔍 Scanning for secrets and dangerous patterns..."
          # Combine existing checks here or use specialized tools
          grep -rE "(api[_-]?key|secret[_-]?key|password)" src/ 2>/dev/null | grep -v "process.env" || true

  build:
    name: Build & Bundle Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      
      - name: Type Check & Build
        run: npm run build
        
      - name: Bundle Size
        run: |
          DIST_SIZE=$(du -sm dist 2>/dev/null | cut -f1 || echo "0")
          echo "Bundle size: ${DIST_SIZE}MB"
          if [ "$DIST_SIZE" -gt 10 ]; then echo "⚠️ Warning: Large bundle"; fi

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
        
      - name: Run E2E Tests
        run: |
          # Note: Should ideally use a local server or staging env
          npm run test:e2e
        continue-on-error: true # Keep PR green if E2E is flaky for now

  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          configPath: ./lighthouserc.json
        env:
          LHCI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
